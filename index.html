<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>타임클라우드 메모</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-deep:  #1a3d2b;
    --green-mid:   #2d6a4f;
    --green-soft:  #52b788;
    --green-pale:  #d8f3dc;
    --green-mist:  #f0faf2;
    --cream:       #faf8f3;
    --ink:         #1c1c1c;
    --ink-light:   #5a5a5a;
    --line:        #d4e8d4;
    --radius:      16px;
    --radius-sm:   10px;
  }

  html, body {
    height: 100%;
    background: var(--cream);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--green-deep);
    padding: 52px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(82,183,136,0.15);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(82,183,136,0.08);
  }
  .header-label {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--green-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .header-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    line-height: 1.2;
  }
  .header-date {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 300;
  }

  /* ── 탭 ── */
  .tab-wrap {
    display: flex;
    gap: 0;
    margin: 20px 20px 0;
    background: var(--green-pale);
    border-radius: var(--radius);
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 12px 0;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--green-mid);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .tab.active {
    background: var(--green-mid);
    color: #fff;
    box-shadow: 0 2px 8px rgba(45,106,79,0.3);
  }

  /* ── 폼 카드 ── */
  .form-card {
    margin: 16px 20px;
    background: #fff;
    border-radius: var(--radius);
    padding: 24px 20px;
    box-shadow: 0 1px 12px rgba(26,61,43,0.08);
  }

  .field {
    margin-bottom: 20px;
  }
  .field:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: var(--green-mid);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input[type="date"],
  input[type="text"],
  textarea {
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--green-mist);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  input:focus, textarea:focus {
    border-color: var(--green-soft);
    background: #fff;
  }
  textarea {
    resize: none;
    min-height: 100px;
    line-height: 1.6;
  }

  /* ── 제출 버튼 ── */
  .btn-submit {
    width: 100%;
    margin: 8px 20px 0;
    width: calc(100% - 40px);
    padding: 18px;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nanum Myeongjo', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(45,106,79,0.3);
  }
  .btn-submit:active {
    background: var(--green-deep);
    transform: scale(0.98);
  }

  /* ── 완료 메시지 ── */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green-deep);
    color: #fff;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ── 기록 목록 ── */
  .records-wrap {
    margin: 16px 20px;
    padding-bottom: 40px;
  }
  .record-item {
    background: #fff;
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: 0 1px 8px rgba(26,61,43,0.06);
    border-left: 4px solid var(--green-soft);
    animation: slideIn 0.3s ease;
  }
  .record-item.희망자 {
    border-left-color: #74c69d;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .record-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .record-name {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
  }
  .record-tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500;
  }
  .record-tag.참여자 { background: var(--green-pale); color: var(--green-mid); }
  .record-tag.희망자 { background: #e8f8ee; color: #40916c; }
  .record-date {
    font-size: 11px;
    color: var(--ink-light);
    margin-bottom: 8px;
  }
  .record-content {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.6;
    margin-bottom: 6px;
  }
  .record-next {
    font-size: 12px;
    color: var(--green-mid);
    background: var(--green-mist);
    padding: 6px 10px;
    border-radius: 6px;
    margin-top: 6px;
  }
  .record-next::before { content: '→ '; }

  .edit-banner {
    margin: 0 20px 0;
    background: #fff8e1;
    border: 1.5px solid #ffe082;
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #795548;
    display: none;
    align-items: center;
    justify-content: space-between;
  }
  .edit-banner button {
    background: none;
    border: none;
    color: #aaa;
    font-size: 13px;
    cursor: pointer;
  }
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-light);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── 안내 카드 ── */
  .info-card {
    margin: 16px 20px;
    background: var(--green-pale);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .info-card h3 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--green-deep);
    margin-bottom: 10px;
  }
  .info-card p {
    font-size: 12px;
    color: var(--green-mid);
    line-height: 1.8;
  }
  code {
    background: rgba(45,106,79,0.12);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">TimeCloud</div>
  <div class="header-title">참여자 메모</div>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="tab-wrap">
  <button class="tab active" id="main-tab-input" onclick="showTab('input')">✏️ 새 메모</button>
  <button class="tab" id="main-tab-records" onclick="showTab('records')">📋 기록 보기</button>
</div>

<!-- 입력 탭 -->
<div id="tab-input">
  <!-- 편집 중 배너 -->
<div class="edit-banner" id="editBanner">
  ✏️ 기록을 수정하고 있어요
  <button onclick="cancelEdit()">취소</button>
</div>

<div class="form-card">

    <div class="field">
      <label>구분</label>
      <div class="tab-wrap" style="margin: 0; background: #f4f4f4;">
        <button class="tab active" id="type-참여자" onclick="selectType('참여자')">참여자</button>
        <button class="tab" id="type-희망자" onclick="selectType('희망자')">희망자</button>
      </div>
    </div>

    <div class="field">
      <label>날짜</label>
      <input type="date" id="date">
    </div>

    <div class="field">
      <label>이름</label>
      <input type="text" id="name" placeholder="이름을 입력하세요">
    </div>

    <div class="field">
      <label>나눈 이야기</label>
      <textarea id="story" placeholder="오늘 어떤 이야기를 나눴나요?"></textarea>
    </div>

    <div class="field">
      <label>다음에 챙길 것</label>
      <textarea id="next" placeholder="다음에 확인하거나 연락할 내용" style="min-height:70px;"></textarea>
    </div>

  </div>

  <button class="btn-submit" onclick="submitMemo()">저장하기</button>


</div>

<!-- 기록 탭 -->
<div id="tab-records" style="display:none;">
  <div class="records-wrap" id="recordsList"></div>
</div>

<div class="toast" id="toast">✅ 저장되었어요</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgr475ebsm_tn6gu5b3oGu2n4YIy8oJzfSQOI0GurmdNYkwB-KDroVFQuqZmx5bNNHxw/exec';

  // ── 날짜 기본값 ──
  const today = new Date();
  const pad = n => String(n).padStart(2, '0');
  const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  document.getElementById('date').value = todayStr;
  document.getElementById('headerDate').textContent =
    `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;

  // ── 구분 선택 ──
  let selectedType = '참여자';
  let editingIndex = null; // 편집 중인 행 인덱스

  function selectType(type) {
    selectedType = type;
    document.getElementById('type-참여자').classList.toggle('active', type === '참여자');
    document.getElementById('type-희망자').classList.toggle('active', type === '희망자');
  }

  // ── 탭 전환 ──
  function showTab(tab) {
    document.getElementById('tab-input').style.display = tab === 'input' ? 'block' : 'none';
    document.getElementById('tab-records').style.display = tab === 'records' ? 'block' : 'none';
    document.getElementById('main-tab-input').classList.toggle('active', tab === 'input');
    document.getElementById('main-tab-records').classList.toggle('active', tab === 'records');
    if (tab === 'records') renderRecords();
  }

  // ── 저장 / 수정 ──
  async function submitMemo() {
    const name = document.getElementById('name').value.trim();
    const story = document.getElementById('story').value.trim();
    if (!name) { alert('이름을 입력해주세요'); return;  }
    if (!story) { alert('나눈 이야기를 입력해주세요'); return; }

    const btn = document.querySelector('.btn-submit');
    btn.textContent = '저장 중...';
    btn.disabled = true;

    const record = {
      date: document.getElementById('date').value,
      name,
      type: selectedType,
      story,
      next: document.getElementById('next').value.trim(),
    };

    try {
      if (editingIndex !== null) {
        // 수정 모드
        record.action = 'update';
        record.index = editingIndex;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(record) });
        editingIndex = null;
        btn.textContent = '저장하기';
        document.getElementById('editBanner').style.display = 'none';
      } else {
        // 새 저장
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(record) });
      }
    } catch(e) {
      console.log('전송 실패');
    }

    // 폼 초기화
    document.getElementById('name').value = '';
    document.getElementById('story').value = '';
    document.getElementById('next').value = '';
    document.getElementById('date').value = todayStr;
    selectType('참여자');
    btn.textContent = '저장하기';
    btn.disabled = false;

    showToast(editingIndex !== null ? '✅ 수정되었어요' : '✅ 저장되었어요');
  }

  // ── 편집 시작 ──
  function editRecord(index, r) {
    editingIndex = index;
    document.getElementById('date').value = r.date || todayStr;
    document.getElementById('name').value = r.name || '';
    document.getElementById('story').value = r.story || '';
    document.getElementById('next').value = r.next || '';
    selectType(r.type || '참여자');
    document.querySelector('.btn-submit').textContent = '수정 저장';
    document.getElementById('editBanner').style.display = 'block';
    showTab('input');
    window.scrollTo(0, 0);
  }

  function cancelEdit() {
    editingIndex = null;
    document.getElementById('name').value = '';
    document.getElementById('story').value = '';
    document.getElementById('next').value = '';
    document.getElementById('date').value = todayStr;
    selectType('참여자');
    document.querySelector('.btn-submit').textContent = '저장하기';
    document.getElementById('editBanner').style.display = 'none';
  }

  // ── 삭제 ──
  async function deleteRecord(index) {
    if (!confirm('이 기록을 삭제할까요?')) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'delete', index })
      });
      renderRecords();
    } catch(e) {
      alert('삭제 실패. 다시 시도해주세요.');
    }
  }

  // ── 기록 불러오기 & 렌더링 ──
  async function renderRecords() {
    const list = document.getElementById('recordsList');
    list.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>불러오는 중...</p></div>`;
    try {
      const res = await fetch(SCRIPT_URL);
      const records = await res.json();
      if (!records.length) {
        list.innerHTML = `<div class="empty-state"><div class="icon">🌿</div><p>아직 기록이 없어요.<br>첫 메모를 남겨보세요.</p></div>`;
        return;
      }
      // 최신순 정렬
      const sorted = [...records].reverse();
      list.innerHTML = sorted.map(r => `
        <div class="record-item ${r.type}">
          <div class="record-meta">
            <span class="record-name">${r.name}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="record-tag ${r.type}">${r.type}</span>
              <button onclick='editRecord(${r.index}, ${JSON.stringify(r)})' style="background:none;border:none;color:#52b788;font-size:14px;cursor:pointer;padding:0 2px;">✏️</button>
              <button onclick="deleteRecord(${r.index})" style="background:none;border:none;color:#bbb;font-size:14px;cursor:pointer;padding:0 2px;">✕</button>
            </div>
          </div>
          <div class="record-date">${r.date}</div>
          <div class="record-content">${r.story}</div>
          ${r.next ? `<div class="record-next">${r.next}</div>` : ''}
        </div>
      `).join('');
    } catch(e) {
      list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>불러오기 실패.<br>잠시 후 다시 시도해주세요.</p></div>`;
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg || '✅ 저장되었어요';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
